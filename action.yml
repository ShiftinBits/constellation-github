name: "Constellation Index"
description: "Index your codebase with Constellation - intelligent, secure codebase exploration for your AI assistants"
author: "ShiftinBits Inc"

branding:
  icon: "share-2"
  color: "gray-dark"

inputs:
  access-key:
    description: "Constellation access key for authentication"
    required: true
  error-reporting:
    description: "Enable error reporting to Constellation in the event of indexing failures."
    required: false
    default: "true"
  skip-diff-check:
    description: "Skip the diff check and always run indexing. Set to 'true' to disable the optimization that skips indexing when no relevant files changed."
    required: false
    default: "false"

outputs:
  indexed:
    description: "Whether the indexing completed successfully"
    value: ${{ steps.index.outputs.indexed || steps.skip.outputs.indexed }}
  summary:
    description: "Summary of the indexing operation"
    value: ${{ steps.index.outputs.summary || steps.skip.outputs.summary }}

runs:
  using: "composite"
  steps:
    - name: Check for relevant changes
      id: diff_check
      shell: bash
      env:
        SKIP_DIFF_CHECK: ${{ inputs.skip-diff-check }}
        BEFORE_SHA: ${{ github.event.before }}
      run: |
        # If skip-diff-check is enabled, always index
        if [[ "$SKIP_DIFF_CHECK" == "true" ]]; then
          echo "Diff check skipped — skip-diff-check is enabled"
          echo "should_index=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # Verify constellation.json exists
        if [[ ! -f "constellation.json" ]]; then
          echo "::error::constellation.json not found in repository root. This file is required for Constellation indexing."
          exit 1
        fi

        # Extract file extensions from constellation.json
        EXTENSIONS=$(jq -r '.languages | to_entries[].value.fileExtensions[]' constellation.json 2>/dev/null)
        if [[ -z "$EXTENSIONS" ]]; then
          echo "::warning::No file extensions configured in constellation.json — skipping indexing"
          echo "should_index=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # Extract exclude patterns (may be empty)
        EXCLUDES=$(jq -r '.exclude[]? // empty' constellation.json 2>/dev/null)

        # Handle zero-SHA (first push) or empty SHA (schedule/workflow_dispatch)
        if [[ -z "$BEFORE_SHA" || "$BEFORE_SHA" == "0000000000000000000000000000000000000000" ]]; then
          echo "No baseline commit available — always indexing"
          echo "should_index=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # Get changed files
        if ! CHANGED_FILES=$(git diff --name-only "$BEFORE_SHA" HEAD 2>/dev/null); then
          echo "::warning::git diff failed (shallow clone or force-push) — falling back to full index"
          echo "should_index=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        if [[ -z "$CHANGED_FILES" ]]; then
          echo "No files changed — skipping indexing"
          echo "should_index=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # Check if any changed file matches a configured extension and is not excluded
        is_excluded() {
          local file="$1"
          if [[ -z "$EXCLUDES" ]]; then
            return 1
          fi
          while IFS= read -r pattern; do
            [[ -z "$pattern" ]] && continue
            # Handle dir/** patterns as prefix match
            local prefix="${pattern%%/\*\*}"
            if [[ "$prefix" != "$pattern" && "$file" == "$prefix"/* ]]; then
              return 0
            fi
            # Handle **/ prefix patterns
            local suffix="${pattern##\*\*/}"
            if [[ "$suffix" != "$pattern" && ( "$file" == */$suffix || "$file" == $suffix ) ]]; then
              return 0
            fi
            # Direct glob match
            if [[ "$file" == $pattern ]]; then
              return 0
            fi
          done <<< "$EXCLUDES"
          return 1
        }

        SHOULD_INDEX="false"
        while IFS= read -r file; do
          [[ -z "$file" ]] && continue
          # Check if file extension matches any configured extension
          file_ext=".${file##*.}"
          while IFS= read -r ext; do
            [[ -z "$ext" ]] && continue
            if [[ "$file_ext" == "$ext" ]]; then
              # Extension matches — check if excluded
              if ! is_excluded "$file"; then
                echo "Relevant change detected: $file"
                SHOULD_INDEX="true"
                break 2
              fi
            fi
          done <<< "$EXTENSIONS"
        done <<< "$CHANGED_FILES"

        if [[ "$SHOULD_INDEX" == "true" ]]; then
          echo "Relevant files changed — indexing will proceed"
        else
          echo "No relevant files changed — skipping indexing"
        fi
        echo "should_index=$SHOULD_INDEX" >> "$GITHUB_OUTPUT"

    - name: Setup Node.js
      if: steps.diff_check.outputs.should_index == 'true'
      uses: actions/setup-node@v4
      with:
        node-version: "24"

    - name: Install Constellation CLI
      if: steps.diff_check.outputs.should_index == 'true'
      shell: bash
      run: npm install -g @constellationdev/cli@latest --silent --no-fund --no-audit 2>/dev/null

    - name: Install LSP servers for enrichment
      if: steps.diff_check.outputs.should_index == 'true'
      shell: bash
      run: npm install -g typescript-language-server typescript pyright --silent --no-fund --no-audit 2>/dev/null

    - name: Run Constellation Index
      id: index
      if: steps.diff_check.outputs.should_index == 'true'
      shell: bash
      env:
        CONSTELLATION_ACCESS_KEY: ${{ inputs.access-key }}
        CONSTELLATION_ERROR_REPORTING: ${{ inputs.error-reporting }}
      run: |
        echo "::group::Constellation Index"
        if constellation index; then
          echo "indexed=true" >> "$GITHUB_OUTPUT"
          echo "summary=Indexing completed successfully" >> "$GITHUB_OUTPUT"
          echo "::endgroup::"
        else
          echo "indexed=false" >> "$GITHUB_OUTPUT"
          echo "summary=Indexing failed" >> "$GITHUB_OUTPUT"
          echo "::endgroup::"
          exit 1
        fi

    - name: Set skip output
      id: skip
      if: success() && steps.diff_check.outputs.should_index != 'true'
      shell: bash
      run: |
        echo "indexed=false" >> "$GITHUB_OUTPUT"
        echo "summary=No relevant files changed — indexing skipped" >> "$GITHUB_OUTPUT"
